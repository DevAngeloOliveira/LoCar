services:
  postgres:
    image: postgres:15-alpine
    container_name: locar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: locar
      POSTGRES_PASSWORD: locar123
      POSTGRES_DB: locar
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U locar']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
